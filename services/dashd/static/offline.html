<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClawOS — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 480px;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.8rem;
      color: #7c6af5;
      margin-bottom: 0.75rem;
    }
    p {
      color: #888;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .retry-btn {
      background: #7c6af5;
      color: #fff;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .retry-btn:hover {
      background: #6a5ae0;
    }
    .status {
      margin-top: 1.5rem;
      padding: 1rem;
      background: rgba(124, 106, 245, 0.1);
      border: 1px solid rgba(124, 106, 245, 0.2);
      border-radius: 8px;
      font-size: 0.85rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">⚡</div>
    <h1>You're Offline</h1>
    <p>ClawOS can't reach your local services right now. Make sure your server is running and your device is on the same network.</p>
    <button class="retry-btn" onclick="location.reload()">Retry Connection</button>
    <div class="status">
      Cached data may still be available. Local AI models continue running even without network access — that's the beauty of keeping everything on your machine.
    </div>
  </div>
  <script>
    // Auto-retry when connection returns
    window.addEventListener('online', () => location.reload());
  </script>
</body>
</html>
