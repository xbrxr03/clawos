name: openclaw
version: "1.0.0"
description: "Full-featured agent runtime with 13,700+ community skills and multi-channel support (Discord, Telegram, Slack, Signal, WhatsApp)."
category: framework
install_method: npm
package: "@openclaw/cli"
entry_point: openclaw
port: 3000
compatible_tiers: [arm-cpu-16gb, x86-cpu-16gb, x86-cuda-12gb, x86-cpu-32gb, arm-npu-16gb]
incompatible_tiers: [arm-cpu-4gb, arm-cpu-8gb]
requires_ollama: true
requires_node: true
api_base: "http://localhost:11500/v1"
managed_by: openclaw_integration
links:
  website: "https://openclaw.ai"
  github: "https://github.com/openclaw/openclaw"
  docs: "https://docs.openclaw.ai"
tags: [framework, skills, multi-channel, voice]
