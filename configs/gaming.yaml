# ClawOS gaming.yaml — Tier D: 32GB+ RAM + GPU >= 10GB VRAM
# Inherits all defaults, adds multi-agent and VRAM scheduler settings.

model:
  chat: "qwen2.5:7b"
  ctx_window: 16384
  temperature: 0.2
  max_loaded: 2          # Tier D can keep 2 models warm in VRAM

agents:
  max_parallel: 3
  vram_per_agent_gb: 5.5
  queue_when_full: true  # queue tasks instead of denying when VRAM full

policyd:
  gpu_guard: true
  vram_reserve_gb: 1.0   # keep 1GB free for system at all times

metricd:
  enabled: true
  export_local: true

voice:
  enabled: true
  engine: "faster-whisper"

memory:
  learned_md_max_kb: 4   # larger LEARNED.md for power users
  recall_n: 8            # more recall results for complex reasoning

dashboard:
  enabled: true
  port: 7070
  show_multiagent: true  # show parallel sessions panel
