# ClawOS default configuration
# All other profiles inherit and override these values

clawos:
  version: "0.1.0"
  edition: "desktop"       # desktop | server

model:
  provider: "ollama"
  chat: "qwen2.5:3b"
  embed: "nomic-embed-text"
  host: "http://localhost:11434"
  ctx_window: 4096
  temperature: 0.3
  max_loaded: 1
  keep_alive: "5m"

memory:
  layers:
    - pinned       # PINNED.md — always injected
    - workflow     # WORKFLOW.md — if task in progress
    - vector       # ChromaDB semantic
    - fts5         # SQLite keyword
    - history      # HISTORY.md tail
  recall_n: 5
  async_writes: true
  dedup_threshold: 0.8

voice:
  enabled: true
  mode: "wake_word"        # push_to_talk | wake_word | off
  stt_model: "base"
  record_rate: 44100
  silence_rms: 300
  silence_secs: 1.8
  tts_provider: "piper"    # piper | elevenlabs
  elevenlabs_voice_id: ""  # set to enable ElevenLabs TTS (Pro tier)

browser:
  enabled: false           # set true to enable Playwright browser agent
  headless: true
  timeout_ms: 30000

policy:
  mode: "recommended"      # recommended | developer
  approval_timeout_s: 120
  default_grants:
    - fs.read
    - fs.write
    - fs.list
    - fs.search
    - web.search
    - memory.read
    - memory.write
    - shell.restricted
    - system.info

workspace:
  default: "nexus_default"
  root: "~/clawos/workspace"

dashboard:
  enabled: true
  port: 7070
  host: "127.0.0.1"
  auth_required: true

whatsapp:
  enabled: false
  session_dir: "~/clawos/config/whatsapp"

services:
  policyd:  { port: 7074, restart: "always" }
  memd:     { port: 7073, restart: "always" }
  modeld:   { port: 7075, restart: "always" }
  toolbridge: { port: 0,  restart: "always" }
  agentd:   { port: 7072, restart: "on-failure" }
  voiced:   { port: 0,    restart: "on-failure" }
  clawd:    { port: 7071, restart: "always" }
  dashd:    { port: 7070, restart: "always" }
  gatewayd: { port: 18789, restart: "on-failure" }

# ── metricd — OTel token tracking ─────────────────────────────────────────────
metricd:
  enabled: true
  export_local: true       # write spans to logs/otel.jsonl
  export_otlp: false       # set endpoint to enable remote Grafana/Datadog
  otlp_endpoint: ""        # e.g. http://grafana:4317
  budget:
    enabled: false         # off by default
    daily_tokens_per_workspace: 100000
    action_on_limit: "warn"   # warn | deny | pause

# ── a2ad — Agent-to-Agent Protocol ────────────────────────────────────────────
a2a:
  enabled: true
  port: 7083
  host: "127.0.0.1"
  auth_token: ""           # set to require Bearer token on inbound tasks
  mdns_enabled: false      # publish _clawos._tcp.local only when intentionally exposed
  discovery_interval_s: 60

# ── picoclawd — Tier A edge runtime ───────────────────────────────────────────
picoclaw:
  enabled: false           # auto-enabled when ARM arch detected
  port: 18800
  github_repo: "sipeed/picoclaw"
  version: "v0.2.4"
  http_timeout: 300
