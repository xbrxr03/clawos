<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClawOS</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:    #07070a;
  --bg1:   #0e0e14;
  --bg2:   #13131c;
  --bg3:   #191924;
  --b:     rgba(255,255,255,0.07);
  --b2:    rgba(255,255,255,0.12);
  --purple:#8b7fff;
  --purple2:#a89bff;
  --green: #4ade80;
  --red:   #f87171;
  --amber: #fbbf24;
  --blue:  #60a5fa;
  --text:  #e2e2ee;
  --dim:   #9090a8;
  --muted: #50506a;
  --mono:  'Space Mono',monospace;
  --sans:  'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:12px}

/* Ambient glow */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 50% 35% at 15% 15%, rgba(139,127,255,.1) 0%,transparent 70%),
    radial-gradient(ellipse 40% 40% at 85% 80%, rgba(168,155,255,.07) 0%,transparent 60%);
}

/* Layout */
.root{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column}

/* Header */
header{
  display:flex;align-items:center;gap:14px;
  padding:0 24px;height:52px;flex-shrink:0;
  border-bottom:1px solid var(--b);
  background:rgba(7,7,10,.9);
  backdrop-filter:blur(20px);
}
.logo{
  font-family:var(--sans);font-size:16px;font-weight:800;letter-spacing:3px;
  background:linear-gradient(135deg,#fff 0%,var(--purple2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.ver{font-size:9px;color:var(--muted);letter-spacing:1px;margin-top:1px}
.sep{width:1px;height:20px;background:var(--b);margin:0 6px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);transition:all .3s}
.dot.off{background:var(--red);box-shadow:0 0 8px var(--red)}
.conn-lbl{font-size:10px;color:var(--muted)}
.hdr-r{margin-left:auto;display:flex;gap:24px;align-items:center}
.metric .v{
  font-family:var(--sans);font-size:22px;font-weight:800;line-height:1;
  background:linear-gradient(135deg,#fff,var(--purple2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.metric .l{font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px}

/* Grid */
.grid{display:grid;grid-template-columns:1fr 320px;grid-template-rows:1fr 190px;flex:1;min-height:0;gap:1px;background:var(--b)}

.panel{background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
.ph{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);
    padding:14px 18px 0;flex-shrink:0;display:flex;align-items:center;gap:8px}
.ph-dot{width:5px;height:5px;border-radius:50%}
.ph-dot.purple{background:var(--purple)}
.ph-dot.green{background:var(--green)}
.ph-dot.amber{background:var(--amber)}
.ph-dot.red{background:var(--red)}

/* Chat */
.msgs{flex:1;overflow-y:auto;padding:12px 18px;display:flex;flex-direction:column;gap:2px;min-height:0}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

.msg{padding:9px 14px;border-radius:8px;animation:fu .18s ease}
@keyframes fu{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.msg .who{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:4px}
.msg .body{line-height:1.65;color:var(--dim);word-break:break-word;white-space:pre-wrap}

.msg.user{background:rgba(139,127,255,.1);border:1px solid rgba(139,127,255,.18)}
.msg.user .who{color:var(--purple2)}
.msg.user .body{color:var(--text)}
.msg.nexus{background:var(--bg2);border:1px solid var(--b)}
.msg.nexus .who{color:var(--green)}
.msg.sys .who{display:none}
.msg.sys{background:transparent;border:none;padding:3px 0}
.msg.sys .body{color:var(--muted);font-size:10px}

/* Thinking dots */
.think{display:flex;gap:5px;align-items:center;padding:10px 14px}
.think span{width:5px;height:5px;border-radius:50%;background:var(--purple2);animation:bl 1.1s infinite}
.think span:nth-child(2){animation-delay:.18s}
.think span:nth-child(3){animation-delay:.36s}
@keyframes bl{0%,80%,100%{opacity:.2;transform:scale(.75)}40%{opacity:1;transform:scale(1)}}

.input-row{
  display:flex;gap:10px;padding:12px 18px;flex-shrink:0;
  border-top:1px solid var(--b);background:rgba(7,7,10,.6);
}
input[type=text]{
  flex:1;background:var(--bg2);border:1px solid var(--b);
  color:var(--text);padding:9px 14px;
  font-family:var(--mono);font-size:12px;border-radius:8px;outline:none;
  transition:border-color .15s,box-shadow .15s;
}
input[type=text]:focus{border-color:rgba(139,127,255,.5);box-shadow:0 0 0 3px rgba(139,127,255,.08)}
input::placeholder{color:var(--muted)}
.send{
  background:linear-gradient(135deg,var(--purple),var(--purple2));
  border:none;color:#fff;padding:9px 18px;border-radius:8px;
  cursor:pointer;font-family:var(--mono);font-size:11px;font-weight:700;
  letter-spacing:.5px;transition:opacity .15s,transform .1s;
  box-shadow:0 4px 18px rgba(139,127,255,.28);
}
.send:hover{opacity:.88;transform:translateY(-1px)}
.send:active{transform:translateY(0)}

/* Right panel */
.rpanel{grid-row:1/3;background:var(--bg1);border-left:1px solid var(--b);display:flex;flex-direction:column;overflow:hidden}
.rsec{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.rsec+.rsec{border-top:1px solid var(--b);flex:1.4}
.rsec-body{flex:1;overflow-y:auto;padding:8px 16px 12px;min-height:0}
.rsec-body::-webkit-scrollbar{width:2px}
.rsec-body::-webkit-scrollbar-thumb{background:var(--b2)}

/* Approvals */
.acard{
  background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.2);
  border-radius:8px;padding:11px 13px;margin-bottom:8px;animation:fu .2s ease;
}
.acard .al{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--amber);font-weight:700;margin-bottom:5px}
.acard .at{color:var(--text);margin-bottom:2px;font-size:11px}
.acard .ag{color:var(--muted);font-size:10px;margin-bottom:9px;word-break:break-all}
.abtns{display:flex;gap:6px}
.ba,.bd{
  flex:1;padding:6px;border:none;border-radius:6px;
  cursor:pointer;font-family:var(--mono);font-size:10px;font-weight:700;
  transition:background .1s;
}
.ba{background:rgba(74,222,128,.12);color:var(--green);border:1px solid rgba(74,222,128,.2)}
.bd{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.18)}
.ba:hover{background:rgba(74,222,128,.22)}
.bd:hover{background:rgba(248,113,113,.2)}
.empty{color:var(--muted);font-size:11px;padding:4px 0}

/* Audit log */
.loglist{overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:1px;min-height:0}
.loglist::-webkit-scrollbar{width:2px}
.loglist::-webkit-scrollbar-thumb{background:var(--b2)}
.le{
  display:flex;gap:8px;padding:5px 8px;border-radius:4px;
  font-size:10px;line-height:1.4;border-left:2px solid transparent;
  transition:background .1s;
}
.le:hover{background:var(--bg2)}
.le.allow{border-color:rgba(74,222,128,.45)}
.le.deny{border-color:rgba(248,113,113,.45)}
.le.warn{border-color:rgba(251,191,36,.45)}
.lt{color:var(--muted);flex-shrink:0;width:56px;font-size:9px}
.ls{color:var(--purple2);flex-shrink:0;width:52px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:9px}
.lm{color:var(--dim);flex:1;word-break:break-all}
.le.allow .lm{color:rgba(74,222,128,.8)}
.le.deny  .lm{color:rgba(248,113,113,.8)}

/* Tasks */
.tpanel{grid-column:1;grid-row:2;border-top:1px solid var(--b)}
.tlist{display:flex;gap:10px;overflow-x:auto;flex:1;min-height:0;padding:8px 18px 12px}
.tlist::-webkit-scrollbar{height:3px}
.tlist::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
.tc{
  flex-shrink:0;background:var(--bg2);border:1px solid var(--b);
  border-radius:8px;padding:11px 13px;width:188px;
  transition:border-color .2s,transform .15s;cursor:default;
}
.tc:hover{transform:translateY(-2px)}
.tc.running{border-color:rgba(251,191,36,.3)}
.tc.completed{border-color:rgba(74,222,128,.2)}
.tc.failed{border-color:rgba(248,113,113,.2)}
.tid{font-size:9px;color:var(--muted);margin-bottom:4px}
.tint{color:var(--text);margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px}
.tres{color:var(--muted);font-size:10px;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-top:5px}
.sb{
  display:inline-block;font-size:9px;font-weight:700;
  letter-spacing:1px;padding:2px 8px;border-radius:20px;text-transform:uppercase;
}
.sb.queued{background:rgba(80,80,106,.2);color:var(--muted)}
.sb.running{background:rgba(251,191,36,.12);color:var(--amber)}
.sb.completed{background:rgba(74,222,128,.1);color:var(--green)}
.sb.failed{background:rgba(248,113,113,.1);color:var(--red)}
</style>
</head>
<body>
<div class="root">

<!-- Header -->
<header>
  <div>
    <div class="logo">CLAWOS</div>
    <div class="ver" id="ver-lbl">v0.1.0 · Nexus</div>
  </div>
  <div class="sep"></div>
  <div class="dot off" id="dot"></div>
  <div class="conn-lbl" id="conn-lbl">connecting...</div>
  <div class="hdr-r">
    <div class="metric"><div class="v" id="m-tasks">0</div><div class="l">tasks</div></div>
    <div class="metric"><div class="v" id="m-model">—</div><div class="l">model</div></div>
    <div class="metric"><div class="v" id="m-pend">0</div><div class="l">pending</div></div>
  </div>
</header>

<!-- Grid -->
<div class="grid">

  <!-- Chat -->
  <div class="panel" style="grid-row:1">
    <div class="ph"><div class="ph-dot purple"></div>Chat</div>
    <div class="msgs" id="msgs"></div>
    <div class="input-row">
      <input type="text" id="inp" placeholder="Message Nexus..." autocomplete="off">
      <button class="send" onclick="send()">Send ↵</button>
    </div>
  </div>

  <!-- Right: approvals + audit -->
  <div class="rpanel">
    <div class="rsec">
      <div class="ph"><div class="ph-dot amber"></div>Approvals</div>
      <div class="rsec-body"><div id="aplist"><div class="empty">No pending approvals</div></div></div>
    </div>
    <div class="rsec">
      <div class="ph"><div class="ph-dot green"></div>Audit Log</div>
      <div class="rsec-body loglist" id="loglist"></div>
    </div>
  </div>

  <!-- Tasks -->
  <div class="panel tpanel">
    <div class="ph"><div class="ph-dot blue"></div>Tasks</div>
    <div class="tlist" id="tlist"></div>
  </div>

</div>
</div>

<script>
const API='';let ws=null,think=null;
function connect(){
  ws=new WebSocket(`ws://${location.host}/ws`);
  ws.onopen=()=>{setC(true);loadAll()};
  ws.onclose=()=>{setC(false);setTimeout(connect,2000)};
  ws.onmessage=e=>onEv(JSON.parse(e.data));
}
function setC(ok){
  document.getElementById('dot').className='dot'+(ok?'':' off');
  document.getElementById('conn-lbl').textContent=ok?'connected':'reconnecting...';
}
function onEv(ev){
  if(ev.type==='task_update'){loadTasks();updM();rmThink()}
  if(ev.type==='approval_request'||ev.type==='approval_decided'){loadAp();updM()}
  if(ev.type==='log'){addLog(ev)}
  if(ev.type==='chat_message'){rmThink();addMsg('nexus',ev.message||'')}
}
async function send(){
  const inp=document.getElementById('inp');
  const msg=inp.value.trim();if(!msg)return;
  addMsg('user',msg);inp.value='';addThink();
  const r=await fetch(`${API}/api/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg,workspace:'default'})});
  const d=await r.json();
  poll(d.task_id);
}
async function poll(id){
  for(let i=0;i<90;i++){
    await sleep(1000);
    const r=await fetch(`${API}/api/tasks/${id}`);
    const t=await r.json();
    if(t.status==='completed'){rmThink();if(t.result)addMsg('nexus',t.result);loadTasks();updM();return}
    if(t.status==='failed'){rmThink();addMsg('nexus','Error: '+(t.error||'task failed'));return}
  }
  rmThink();
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
document.getElementById('inp').addEventListener('keydown',e=>{if(e.key==='Enter')send()});
function addMsg(who,txt){
  const box=document.getElementById('msgs');
  const el=document.createElement('div');
  el.className='msg '+(who==='system'?'sys':who);
  const label=who==='user'?'you':who;
  el.innerHTML=`<div class="who">${label}</div><div class="body">${esc(txt)}</div>`;
  box.appendChild(el);box.scrollTop=box.scrollHeight;
}
function addThink(){
  rmThink();
  const box=document.getElementById('msgs');
  think=document.createElement('div');think.className='think';
  think.innerHTML='<span></span><span></span><span></span>';
  box.appendChild(think);box.scrollTop=box.scrollHeight;
}
function rmThink(){if(think&&think.parentNode)think.parentNode.removeChild(think);think=null}
function addLog(ev){
  const box=document.getElementById('loglist');
  const el=document.createElement('div');
  const msg=ev.message||'';
  const cls=msg.includes('ALLOW')?'allow':msg.includes('DENY')?'deny':ev.level==='WARN'?'warn':'';
  el.className='le '+cls;
  const t=(ev.timestamp||'').slice(11,19)||'';
  const s=(ev.service||'sys').slice(0,7);
  el.innerHTML=`<span class="lt">${t}</span><span class="ls">${esc(s)}</span><span class="lm">${esc(msg.slice(0,80))}</span>`;
  box.insertBefore(el,box.firstChild);
  if(box.children.length>200)box.removeChild(box.lastChild);
}
async function loadTasks(){
  const r=await fetch(`${API}/api/tasks`);const ts=await r.json();
  document.getElementById('m-tasks').textContent=ts.length;
  document.getElementById('tlist').innerHTML=ts.slice(0,14).map(t=>`
    <div class="tc ${t.status}">
      <div class="tid">${t.task_id}</div>
      <div class="tint">${esc((t.intent||'').slice(0,36))}</div>
      <span class="sb ${t.status}">${t.status}</span>
      ${t.result?`<div class="tres">${esc(t.result.slice(0,80))}</div>`:''}
    </div>`).join('');
}
async function loadAp(){
  const r=await fetch(`${API}/api/approvals`);const list=await r.json();
  document.getElementById('m-pend').textContent=list.length;
  const el=document.getElementById('aplist');
  if(!list.length){el.innerHTML='<div class="empty">No pending approvals</div>';return}
  el.innerHTML=list.map(a=>`
    <div class="acard">
      <div class="al">⏸ approval required</div>
      <div class="at">${esc(a.tool)}</div>
      <div class="ag">${esc((a.target||'').slice(0,55))}</div>
      <div class="abtns">
        <button class="ba" onclick="decide('${a.request_id}',true)">✓ Approve</button>
        <button class="bd" onclick="decide('${a.request_id}',false)">✗ Deny</button>
      </div>
    </div>`).join('');
}
async function decide(id,ok){
  await fetch(`${API}/api/approve/${id}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({approve:ok})});
  loadAp();
}
async function updM(){
  try{
    const r=await fetch(`${API}/api/health`);const h=await r.json();
    const m=(h.model?.current_model||'—').split(':')[0].slice(0,9);
    document.getElementById('m-model').textContent=m;
  }catch{}
}
async function loadAudit(){
  try{
    const r=await fetch(`${API}/api/audit`);const es=await r.json();
    es.slice(0,30).forEach(e=>addLog({
      timestamp:e.timestamp,service:'audit',
      message:`${e.decision} ${e.tool} ${(e.target||'').slice(0,24)}`,
      level:e.decision==='ALLOW'?'INFO':'WARN'
    }));
  }catch{}
}
async function loadAll(){await Promise.all([loadTasks(),loadAp(),updM()])}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
connect();loadAudit();setInterval(()=>{loadTasks();loadAp();updM()},8000);
</script>
</body>
</html>
